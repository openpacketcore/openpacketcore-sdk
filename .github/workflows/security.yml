name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "8.30.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install gitleaks
        shell: bash
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}"
          asset="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl -fsSLO "${base}/${asset}"
          curl -fsSLO "${base}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          grep " ${asset}$" "gitleaks_${GITLEAKS_VERSION}_checksums.txt" > "${asset}.sha256"
          sha256sum -c "${asset}.sha256"
          tar -xzf "${asset}" gitleaks
          chmod +x gitleaks
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"

      - name: Run gitleaks
        run: gitleaks detect --source . --redact --no-banner

  rust-advisories:
    name: Rust advisory scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit --db "${RUNNER_TEMP}/cargo-advisory-db" --deny warnings

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    strategy:
      matrix:
        checks:
          - advisories
          - bans licenses sources
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run cargo-deny
        # v2; immutable pin
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe
        with:
          command: check ${{ matrix.checks }}

  go-vulnerabilities:
    name: Go vulnerability scan
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    defaults:
      run:
        working-directory: operators/sdk-reference-operator
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Go
        uses: actions/setup-go@v7
        with:
          go-version-file: operators/sdk-reference-operator/go.mod
          cache-dependency-path: operators/sdk-reference-operator/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
