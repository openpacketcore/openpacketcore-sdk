name: GTP-U privileged

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RUST_BACKTRACE: "1"

jobs:
  privileged-gtpu:
    name: Privileged Linux GTP-U
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2

      - name: Install kernel tooling
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ethtool iproute2 kmod nftables wireguard-tools

      - name: Check privileged GTP kernel support
        run: |
          set -euo pipefail
          if ! sudo modprobe gtp; then
            sudo apt-get install -y "linux-modules-extra-$(uname -r)" || true
            sudo modprobe gtp
          fi
          lsmod | grep '^gtp'
          sudo modprobe wireguard
          sudo unshare -n -- ip link set lo up

      - name: Build privileged GTP-U test
        run: |
          set -euo pipefail
          export CARGO_HOME="${CARGO_HOME:-${HOME}/.cargo}"
          export RUSTUP_HOME="${RUSTUP_HOME:-${HOME}/.rustup}"
          export CARGO_TARGET_DIR="${RUNNER_TEMP}/gtpu-target"
          cargo test --locked -p opc-gtpu-dataplane --test linux_gtpu_privileged --no-run

      - name: Run privileged GTP-U test in a fresh netns
        run: |
          set -euo pipefail
          export CARGO_HOME="${CARGO_HOME:-${HOME}/.cargo}"
          export RUSTUP_HOME="${RUSTUP_HOME:-${HOME}/.rustup}"
          export CARGO_TARGET_DIR="${RUNNER_TEMP}/gtpu-target"
          sudo env \
            "PATH=${PATH}" \
            "CARGO_HOME=${CARGO_HOME}" \
            "RUSTUP_HOME=${RUSTUP_HOME}" \
            "CARGO_TARGET_DIR=${CARGO_TARGET_DIR}" \
            "OPC_GTPU_RUN_PRIVILEGED=1" \
            unshare -n -- bash -euxo pipefail -c '
              ip link set lo up
              cargo test --locked -p opc-gtpu-dataplane --test linux_gtpu_privileged -- --ignored --nocapture
            '

      - name: Build privileged eBPF GTP-U test
        run: |
          set -euo pipefail
          export CARGO_HOME="${CARGO_HOME:-${HOME}/.cargo}"
          export RUSTUP_HOME="${RUSTUP_HOME:-${HOME}/.rustup}"
          export CARGO_TARGET_DIR="${RUNNER_TEMP}/gtpu-target"
          cargo test --locked -p opc-gtpu-dataplane --test ebpf_gtpu_privileged --no-run

      # Proves the committed CO-RE artifact end-to-end on a real kernel:
      # real ESP-in-UDP/4500 decrypt output-mark -> forwarding -> tc egress
      # selection of a dedicated TEID, and marked GTP-U decap -> forwarding ->
      # selection of the dedicated XFRM OUT policy/SA rather than the default,
      # using the shared wildcard-SPI/reqid profile deployed by an ePDG;
      # exact IPv4/UDP/GTP envelope boundaries, legal L2 padding, zero and
      # nonzero NONE/UNNECESSARY handling, and zero/nonzero PARTIAL rejection
      # (including exact checksum-byte restoration) before PDR lookup;
      # exact attached-program/pinned-map identity and per-CPU counter sums,
      # byte-compatible unmarked traffic, drained legacy schema adoption and
      # populated endpoint-unbound fail-closed migration,
      # grouped dual-stack lifecycle across every inner/outer family pairing,
      # mandatory outer-IPv6 UDP checksum validation, exact IPv4/IPv6 PMTU and
      # fragment handling, generation-safe replacement, restart adoption, and
      # both-family removal,
      # unknown-mark/TEID drops, echo passthrough, restore/adoption, and
      # ownership-safe teardown (no opc_gtpu filters or pins left behind;
      # already-visible foreign filters are preserved).
      - name: Run privileged eBPF GTP-U datapath test in a fresh netns
        run: |
          set -euo pipefail
          export CARGO_HOME="${CARGO_HOME:-${HOME}/.cargo}"
          export RUSTUP_HOME="${RUSTUP_HOME:-${HOME}/.rustup}"
          export CARGO_TARGET_DIR="${RUNNER_TEMP}/gtpu-target"
          sudo env \
            "PATH=${PATH}" \
            "CARGO_HOME=${CARGO_HOME}" \
            "RUSTUP_HOME=${RUSTUP_HOME}" \
            "CARGO_TARGET_DIR=${CARGO_TARGET_DIR}" \
            "OPC_GTPU_RUN_PRIVILEGED=1" \
            unshare -n -- bash -euxo pipefail -c '
              ip link set lo up
              cargo test --locked -p opc-gtpu-dataplane --test ebpf_gtpu_privileged -- --ignored --nocapture
              cargo test --locked -p opc-gtpu-dataplane --lib program_tag_candidates_match_the_running_kernel -- --ignored --nocapture
            '

  linux-6-8-classifier-load:
    name: Linux 6.8 committed classifier load
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2

      - name: Build committed-object load test
        run: |
          set -euo pipefail
          export CARGO_TARGET_DIR="${RUNNER_TEMP}/gtpu-linux68-target"
          cargo test --locked -p opc-gtpu-dataplane --lib --no-run --message-format=json \
            > "${RUNNER_TEMP}/gtpu-linux68-build.jsonl"
          test_binary="$(
            jq -r 'select(.profile.test == true and .target.name == "opc_gtpu_dataplane") | .executable // empty' \
              "${RUNNER_TEMP}/gtpu-linux68-build.jsonl" | tail -n 1
          )"
          test -n "${test_binary}"
          test -x "${test_binary}"
          cp "${test_binary}" "${RUNNER_TEMP}/opc-gtpu-linux68-test"

      - name: Load both classifiers on pinned Linux 6.8
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y cloud-image-utils qemu-system-x86 openssh-client

          image="${RUNNER_TEMP}/ubuntu-24.04-linux68.img"
          curl --fail --location --retry 3 \
            --output "${image}" \
            https://cloud-images.ubuntu.com/releases/noble/release-20260705/ubuntu-24.04-server-cloudimg-amd64.img
          echo "ffe6203da54deeb6db5d2a98a83f9ec8e55f149d3f7ba622e1abe5fa966ee3d6  ${image}" \
            | sha256sum -c -

          key="${RUNNER_TEMP}/gtpu-linux68-key"
          ssh-keygen -q -t ed25519 -N '' -C '' -f "${key}"
          public_key="$(<"${key}.pub")"
          user_data="${RUNNER_TEMP}/gtpu-linux68-user-data"
          metadata="${RUNNER_TEMP}/gtpu-linux68-meta-data"
          printf '%s\n' \
            '#cloud-config' \
            'users:' \
            '  - name: opc' \
            '    groups: [adm, sudo]' \
            '    shell: /bin/bash' \
            '    sudo: ALL=(ALL) NOPASSWD:ALL' \
            '    lock_passwd: true' \
            '    ssh_authorized_keys:' \
            "      - ${public_key}" \
            'ssh_pwauth: false' \
            'disable_root: true' \
            'package_update: false' > "${user_data}"
          printf '%s\n' \
            'instance-id: opc-gtpu-linux68' \
            'local-hostname: opc-gtpu-linux68' > "${metadata}"
          cloud-localds "${RUNNER_TEMP}/gtpu-linux68-seed.iso" "${user_data}" "${metadata}"

          pid_file="${RUNNER_TEMP}/gtpu-linux68-qemu.pid"
          cleanup() {
            if sudo test -s "${pid_file}"; then
              pid="$(sudo cat "${pid_file}")"
              sudo kill "${pid}" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          if sudo test -c /dev/kvm; then
            machine='accel=kvm'
            cpu='host'
          else
            machine='accel=tcg'
            cpu='max'
          fi
          sudo qemu-system-x86_64 \
            -machine "${machine}" \
            -cpu "${cpu}" \
            -smp 2 \
            -m 3072 \
            -drive "file=${image},format=qcow2,if=virtio,snapshot=on" \
            -drive "file=${RUNNER_TEMP}/gtpu-linux68-seed.iso,format=raw,media=cdrom,readonly=on" \
            -netdev user,id=net0,restrict=on,hostfwd=tcp:127.0.0.1:2227-:22 \
            -device virtio-net-pci,netdev=net0 \
            -display none \
            -serial "file:${RUNNER_TEMP}/gtpu-linux68-serial.log" \
            -daemonize \
            -pidfile "${pid_file}"

          ssh_options=(
            -i "${key}"
            -p 2227
            -o BatchMode=yes
            -o ConnectTimeout=2
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=no
            -o UserKnownHostsFile=/dev/null
          )
          ready=0
          for _attempt in $(seq 1 120); do
            if ssh "${ssh_options[@]}" opc@127.0.0.1 true >/dev/null 2>&1; then
              ready=1
              break
            fi
            sleep 2
          done
          if [[ "${ready}" != 1 ]]; then
            sudo tail -n 200 "${RUNNER_TEMP}/gtpu-linux68-serial.log" || true
            exit 1
          fi

          scp \
            -i "${key}" \
            -P 2227 \
            -o BatchMode=yes \
            -o ConnectTimeout=2 \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "${RUNNER_TEMP}/opc-gtpu-linux68-test" \
            opc@127.0.0.1:/tmp/opc-gtpu-linux68-test
          ssh "${ssh_options[@]}" opc@127.0.0.1 '
            set -euo pipefail
            test "$(uname -r)" = "6.8.0-134-generic"
            test "$(</proc/sys/kernel/osrelease)" = "6.8.0-134-generic"
            test "$(dpkg-query -W linux-image-6.8.0-134-generic | cut -f2)" = "6.8.0-134.134"
            case "$(systemd-detect-virt)" in
              kvm|qemu) ;;
              *) exit 1 ;;
            esac
            sudo mountpoint -q /sys/fs/bpf || sudo mount -t bpf bpf /sys/fs/bpf
            chmod 0755 /tmp/opc-gtpu-linux68-test
          '
          load_output="$(
            ssh "${ssh_options[@]}" opc@127.0.0.1 \
              'sudo env OPC_GTPU_RUN_PRIVILEGED=1 /tmp/opc-gtpu-linux68-test --ignored --nocapture program_tag_candidates_match_the_running_kernel' \
              2>&1
          )"
          printf '%s\n' "${load_output}"
          grep -Fq 'test result: ok. 1 passed; 0 failed;' <<< "${load_output}"

  ebpf-object:
    name: eBPF datapath object rebuild
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install pinned nightly Rust toolchain
        run: |
          set -euo pipefail
          rustup toolchain install nightly-2026-06-22 --profile minimal --component rust-src

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/opc-gtpu-dataplane-ebpf

      - name: Install pinned bpf-linker
        run: cargo install bpf-linker --version 0.10.3 --locked

      - name: Verify frozen v1 migration authority
        run: |
          set -euo pipefail
          frozen="crates/opc-gtpu-dataplane/bpf/opc-gtpu-datapath-v1.bpf.o"
          echo "f31ccc2914f2fd61ae8f1e892e9ac0342f9e81350a4a065d5d8dcfcc9f7a943f  ${frozen}" | sha256sum -c -
          readelf -sW "${frozen}" | awk '$4 == "FUNC" && $8 ~ /^opc_gtpu_/ {print $8}' | sort > frozen.programs
          readelf -sW "${frozen}" | awk '$4 == "OBJECT" && $8 ~ /^GTPU_/ {print $8}' | sort > frozen.maps
          diff -u <(printf '%s\n' opc_gtpu_downlink opc_gtpu_uplink) frozen.programs
          diff -u <(printf '%s\n' GTPU_CONFIG GTPU_COUNTERS GTPU_DOWNLINK_PDR GTPU_UPLINK_DSCP GTPU_UPLINK_FAR) frozen.maps
          for marked in GTPU_ULM_FAR GTPU_ULM_DSCP GTPU_DLM_PDR GTPU_M_OWNER GTPU_DL_BIND GTPU_DL_DROP; do
            if grep -qx "${marked}" frozen.maps; then
              echo "frozen v1 authority unexpectedly contains ${marked}" >&2
              exit 1
            fi
          done

      - name: Verify frozen v2 historical blob and structural rebuild inventory
        run: |
          set -euo pipefail
          source_commit="8fa98f275eea35cd16add149b609992345603c8c"
          object_path="crates/opc-gtpu-dataplane/bpf/opc-gtpu-datapath-v2.bpf.o"
          historical_path="crates/opc-gtpu-dataplane/bpf/opc-gtpu-datapath.bpf.o"
          echo "7d0c1b452ad562d4c8c286bf05a4c5308f6fd5b4c677cc3c2125b194860464a5  ${object_path}" | sha256sum -c -
          # This exact historical Git blob is the Apache-2.0-licensed byte
          # authority. The source rebuild below is deliberately only a public
          # program/map inventory comparison; it is not an exact reproducible-
          # build assertion for host-sensitive historical linker output.
          git cat-file blob "${source_commit}:${historical_path}" > "${RUNNER_TEMP}/historical-v2.bpf.o"
          cmp "${object_path}" "${RUNNER_TEMP}/historical-v2.bpf.o"
          readelf -sW "${object_path}" | awk '$4 == "FUNC" && $8 ~ /^opc_gtpu_/ {print $8}' | sort > frozen-v2.programs
          readelf -sW "${object_path}" | awk '$4 == "OBJECT" && $8 ~ /^GTPU_/ {print $8}' | sort > frozen-v2.maps
          diff -u <(printf '%s\n' opc_gtpu_downlink opc_gtpu_uplink) frozen-v2.programs
          diff -u <(printf '%s\n' GTPU_CONFIG GTPU_COUNTERS GTPU_DLM_PDR GTPU_DOWNLINK_PDR GTPU_M_OWNER GTPU_ULM_DSCP GTPU_ULM_FAR GTPU_UPLINK_DSCP GTPU_UPLINK_FAR) frozen-v2.maps
          for endpoint_v3 in GTPU_DL_BIND GTPU_DL_DROP; do
            if grep -qx "${endpoint_v3}" frozen-v2.maps; then
              echo "frozen v2 authority unexpectedly contains ${endpoint_v3}" >&2
              exit 1
            fi
          done
          historical_worktree="${RUNNER_TEMP}/gtpu-v2-source"
          git worktree add --detach "${historical_worktree}" "${source_commit}"
          OPC_EBPF_TARGET_DIR="${RUNNER_TEMP}/gtpu-v2-target" "${historical_worktree}/scripts/build-gtpu-ebpf.sh"
          rebuilt="${RUNNER_TEMP}/gtpu-v2-target/bpfel-unknown-none/release/opc-gtpu-datapath"
          readelf -sW "${rebuilt}" | awk '$4 == "FUNC" && $8 ~ /^opc_gtpu_/ {print $8}' | sort > rebuilt-v2.programs
          readelf -sW "${rebuilt}" | awk '$4 == "OBJECT" && $8 ~ /^GTPU_/ {print $8}' | sort > rebuilt-v2.maps
          diff -u frozen-v2.programs rebuilt-v2.programs
          diff -u frozen-v2.maps rebuilt-v2.maps
          git worktree remove --force "${historical_worktree}"

      # Rebuild the datapath object from source with the pinned toolchain and
      # fail on functional drift against the committed artifact. Whole-object
      # equality is deliberately avoided because DWARF and BTF can contain
      # build-host paths. Executable and map-definition section bytes, plus
      # their semantic relocations, are path-independent and must match.
      - name: Rebuild and compare functional program/map sections
        run: |
          set -euo pipefail
          command -v readelf
          committed="${RUNNER_TEMP}/committed-opc-gtpu-datapath.bpf.o"
          cp crates/opc-gtpu-dataplane/bpf/opc-gtpu-datapath.bpf.o "${committed}"
          ./scripts/build-gtpu-ebpf.sh
          rebuilt="crates/opc-gtpu-dataplane-ebpf/target/bpfel-unknown-none/release/opc-gtpu-datapath"
          inventory() {
            # Private verifier-bounded subprograms retain local linkage. Rust
            # therefore gives them v0-mangled symbols whose crate-disambiguator
            # prefixes can differ across source roots. Normalize only that
            # non-ABI prefix while preserving the complete module/function
            # suffix, then require every packet-path helper explicitly below.
            readelf -sW "$1" | awk '
              $4 == "FUNC" || $4 == "OBJECT" {
                name = $8
                gsub(/C[^_]+_17opc_gtpu_datapath/, "C<crate>_17opc_gtpu_datapath", name)
                gsub(/C[^_]+_20opc_gtpu_ebpf_common/, "C<crate>_20opc_gtpu_ebpf_common", name)
                print $4, name
              }
            ' | sort
          }
          inventory "${committed}" > committed.inventory
          inventory "${rebuilt}" > rebuilt.inventory
          cat rebuilt.inventory
          diff -u committed.inventory rebuilt.inventory
          for symbol in opc_gtpu_uplink opc_gtpu_downlink \
            checksum_loop_chunk parse_downlink authorize_and_decap_legacy_downlink \
            handle_downlink_ipv6 parse_downlink_ipv6 ipv6_udp_offset \
            software_ipv6_udp_checksum_is_valid walk_ipv6_extension_step \
            grouped_uplink_authority grouped_downlink_authority decap_grouped_downlink \
            encapsulate_grouped_ipv4 encapsulate_grouped_ipv6 \
            checksum_bytes_are_materialized select_gtpu_session_entry_wire \
            wire_address_is_canonical apply_uplink_mtu_policy \
            pdp_commit_wire_is_valid pdp_commit_wire_authorizes_graph \
            marked_owner_wire_authorizes_uplink pdp_commit_wire_authorizes_downlink \
            marked_owner_wire_authorizes_downlink \
            GTPU_UPLINK_FAR GTPU_ULM_FAR GTPU_UPLINK_DSCP GTPU_ULM_DSCP \
            GTPU_UL_SPORT GTPU_ULM_SPORT GTPU_PMTU_CFG GTPU_PMTU_DROP \
            GTPU_DOWNLINK_PDR GTPU_DLM_PDR GTPU_DL_BIND GTPU_DL_DROP \
            GTPU_M_OWNER GTPU_COUNTERS GTPU_CONFIG GTPU_SESSIONS \
            GTPU_UL_INDEX GTPU_DL_INDEX GTPU_SESS_TXN GTPU_SCHEMA6 GTPU_CONFIG6; do
            grep -Eq "( |[[:digit:]])${symbol}$" committed.inventory
          done

          functional_section_names() {
            # Strip readelf's variably padded numeric index, then select every
            # executable PROGBITS section and both map-section spellings used
            # by Rust eBPF toolchains. Debug/BTF sections stay out of the
            # comparison because they may contain build-host paths.
            readelf -SW "$1" \
              | sed -E 's/^[[:space:]]*\[[[:space:]]*[0-9]+\][[:space:]]+//' \
              | awk '$2 == "PROGBITS" && ($7 ~ /X/ || $1 == "maps" || $1 == ".maps") {print $1}' \
              | LC_ALL=C sort
          }

          functional_section_manifest() {
            local object="$1"
            local digest
            local section
            while IFS= read -r section; do
              [[ -n "${section}" ]] || continue
              # GNU objcopy on the hosted runner does not recognize EM_BPF.
              # Keep readelf failure visible as an assignment status under
              # `set -euo pipefail`, then hash its exact section-byte dump.
              digest="$(readelf --hex-dump="${section}" "${object}" | sha256sum | awk '{print $1}')"
              printf '%s %s\n' "${section}" "${digest}"
            done < <(functional_section_names "${object}")
          }

          functional_relocations() {
            local object="$1"
            local sections
            sections="$(functional_section_names "${object}")"
            # Omit the symbol-table index (readelf field 2), which is only an
            # ELF implementation detail. Preserve the relocation section,
            # instruction/data offset, type, target value/name, and addend.
            readelf -rW "${object}" | awk -v functional="${sections}" '
              BEGIN {
                count = split(functional, names, "\n")
                for (item = 1; item <= count; item++) {
                  if (names[item] != "") {
                    wanted[".rel" names[item]] = 1
                    wanted[".rela" names[item]] = 1
                  }
                }
              }
              /^Relocation section / {
                section = $3
                gsub(/\047/, "", section)
                active = section in wanted
                if (active) {
                  print "SECTION", section
                }
                next
              }
              active && $1 ~ /^[[:xdigit:]]+$/ {
                line = section " " $1
                for (field = 3; field <= NF; field++) {
                  line = line " " $field
                }
                gsub(/_RNvC[^_]+_17opc_gtpu_datapath/, "_RNvC<crate>_17opc_gtpu_datapath", line)
                gsub(/_RNvC[^_]+_20opc_gtpu_ebpf_common/, "_RNvC<crate>_20opc_gtpu_ebpf_common", line)
                print line
              }
            '
          }

          functional_section_names "${committed}" > committed.functional-sections
          functional_section_names "${rebuilt}" > rebuilt.functional-sections
          diff -u committed.functional-sections rebuilt.functional-sections
          for section in .text classifier maps; do
            grep -Fxq "${section}" committed.functional-sections
          done

          functional_section_manifest "${committed}" > committed.functional-manifest
          functional_section_manifest "${rebuilt}" > rebuilt.functional-manifest
          cat rebuilt.functional-manifest
          diff -u committed.functional-manifest rebuilt.functional-manifest

          functional_relocations "${committed}" > committed.functional-relocations
          functional_relocations "${rebuilt}" > rebuilt.functional-relocations
          diff -u committed.functional-relocations rebuilt.functional-relocations
