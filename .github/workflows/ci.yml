name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RUST_BACKTRACE: "1"

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check diff whitespace
        run: git diff --check

      - name: Run management-plane policy gates
        run: |
          python3 scripts/check-management-plane-policy.py --self-test
          python3 scripts/check-management-plane-policy.py --check

      - name: Run opc-proto-diameter corpus generator self-test
        run: python3 crates/opc-proto-diameter/fuzz/generate_corpus.py self-test

      # Compile this package in isolation before workspace all-feature
      # unification can mask an accidental dependency on test-only hooks.
      - name: Check opc-persist default test contract
        run: |
          cargo clippy --locked -p opc-persist --all-targets --no-default-features -- -D warnings
          cargo test --locked -p opc-persist --no-run
          cargo test --locked -p opc-persist \
            --test break_glass_tests \
            --test security_policy_tests \
            --test security_policy_stress_tests \
            --test security_policy_empirical_tests \
            -- --test-threads=1

      - name: Run clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked --workspace --exclude opc-persist --all-features --quiet -- --test-threads=4

      - name: Run GTP-U unsupported-platform cfg tests
        run: RUSTFLAGS="--cfg opc_linux_gtpu_sys_force_unsupported" cargo test --locked -p opc-linux-gtpu-sys -p opc-gtpu-dataplane --no-default-features --quiet

      # The opc-persist e2e suites drive real consensus subprocess clusters
      # (3-4 nodes plus TCP proxies per test). Running several clusters
      # concurrently oversubscribes shared runners and destabilizes the
      # port-block allocator, so these suites run single-threaded in CI.
      - name: Run consensus e2e tests (serial)
        run: cargo test --locked -p opc-persist --all-features --quiet -- --test-threads=1

  session-net-i686:
    name: opc-session-net i686
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CARGO_TARGET_I686_UNKNOWN_LINUX_GNU_LINKER: gcc
      RUSTFLAGS: "-C link-arg=-m32"
      TARGET_CC: gcc
      TARGET_CFLAGS: "-m32"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install 32-bit system toolchain
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends gcc-multilib

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-unknown-linux-gnu

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: opc-session-net-i686

      - name: Run opc-session-net tests on i686
        run: cargo test --locked -p opc-session-net --all-features --target i686-unknown-linux-gnu --quiet -- --test-threads=4

  feature-powerset:
    name: opc-sdk feature powerset
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-hack
        uses: taiki-e/install-action@v2.83.0
        with:
          tool: cargo-hack@0.6.45
          fallback: none

      - name: Check opc-sdk feature powerset
        run: cargo hack check -p opc-sdk --feature-powerset --depth 2 --locked

  generated-drift:
    name: Generated code drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install generator dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML==6.0.2
          cargo install rasn-compiler --version 0.16.0 --features cli --locked

      - name: Regenerate API and NGAP bindings
        run: make generate-api generate-ngap

      - name: Check generated code drift
        run: git diff --exit-code -- crates/opc-proto-ngap/src/generated.rs crates/opc-api-nnrf/src/types.rs

  smf-reference:
    name: Reference SMF consumer
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: examples/smf-reference
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked --all-features --quiet -- --test-threads=4

  msrv:
    name: MSRV check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain (1.88)
        uses: dtolnay/rust-toolchain@1.88

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2

      - name: Check MSRV
        run: cargo check --workspace --all-targets --all-features

      - name: Publish-order graph check
        run: python3 scripts/publish-order.py --check

  docs:
    name: Rust documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2

      - name: Build docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --all-features

  go-operator:
    name: Go reference operator
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    defaults:
      run:
        working-directory: operators/sdk-reference-operator
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: operators/sdk-reference-operator/go.mod
          cache-dependency-path: operators/sdk-reference-operator/go.sum

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.12.2/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Check Go formatting
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }

      - name: Run Go vet
        run: go vet ./...

      - name: Run golangci-lint
        run: golangci-lint run ./...

      - name: Run Go tests
        env:
          # The race runtime needs cgo on linux (cmd/go/internal/work/init.go);
          # only this step overrides the job's pure-Go build posture.
          CGO_ENABLED: "1"
        run: go test -race ./...

  go-sdk:
    name: Go operator SDK
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    defaults:
      run:
        working-directory: operators/operator-sdk-go
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: operators/operator-sdk-go/go.mod
          cache-dependency-path: operators/operator-sdk-go/go.sum

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.12.2/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Check Go formatting
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }

      - name: Run Go vet
        run: go vet ./...

      - name: Run golangci-lint
        run: golangci-lint run ./...

      - name: Run Go tests
        env:
          # The race runtime needs cgo on linux (cmd/go/internal/work/init.go);
          # only this step overrides the job's pure-Go build posture.
          CGO_ENABLED: "1"
        run: go test -race ./...

      - name: Check downstream import contract
        run: ./scripts/check-downstream-import.sh

  manifests:
    name: Kubernetes manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install kubectl
        uses: azure/setup-kubectl@v5

      - name: Render Kustomize manifests
        run: kubectl kustomize operators/sdk-reference-operator/config/default

  helm:
    name: Helm chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Helm lint
        run: helm lint operators/helm/sdk-reference-operator/

      # kubectl client-side dry runs cannot resolve CRD kinds (cert-manager
      # Issuer/Certificate) without a cluster, so rendered output is checked
      # as strict YAML instead.
      - name: Helm template (cert-manager)
        run: |
          helm template sdk-ref operators/helm/sdk-reference-operator/ > /tmp/rendered-certmanager.yaml
          python3 -c 'import yaml; list(yaml.safe_load_all(open("/tmp/rendered-certmanager.yaml")))'

      - name: Helm template (manual cert)
        run: |
          helm template sdk-ref operators/helm/sdk-reference-operator/ --set webhook.certMode=manual --set webhook.secretName=my-secret > /tmp/rendered-manual.yaml
          python3 -c 'import yaml; list(yaml.safe_load_all(open("/tmp/rendered-manual.yaml")))' 
