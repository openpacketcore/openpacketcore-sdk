name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RUST_BACKTRACE: "1"

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check diff whitespace
        run: git diff --check

      - name: Run clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked --workspace --all-features --quiet -- --test-threads=4

  go-operator:
    name: Go reference operator
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    defaults:
      run:
        working-directory: operators/sdk-reference-operator
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: operators/sdk-reference-operator/go.mod
          cache-dependency-path: operators/sdk-reference-operator/go.sum

      - name: Run Go tests
        run: go test ./...

  manifests:
    name: Kubernetes manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Render Kustomize manifests
        run: kubectl kustomize operators/sdk-reference-operator/config/default
