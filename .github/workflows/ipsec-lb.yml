name: IPsec LB

on:
  pull_request:
    paths:
      - "crates/opc-ipsec-lb/**"
      - "crates/opc-ipsec-lb-ebpf/**"
      - "crates/opc-ipsec-lb-ebpf-common/**"
      - "crates/opc-session-net/**"
      - ".github/workflows/ipsec-lb.yml"
      - "scripts/build-ipsec-lb-ebpf.sh"
      - "Cargo.toml"
      - "Cargo.lock"
  push:
    branches:
      - main
    paths:
      - "crates/opc-ipsec-lb/**"
      - "crates/opc-ipsec-lb-ebpf/**"
      - "crates/opc-ipsec-lb-ebpf-common/**"
      - "crates/opc-session-net/**"
      - ".github/workflows/ipsec-lb.yml"
      - "scripts/build-ipsec-lb-ebpf.sh"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RUST_BACKTRACE: "1"

jobs:
  conformance:
    name: Kernel-independent conformance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check diff whitespace
        run: git diff --check

      - name: Run clippy
        run: cargo clippy --locked -p opc-ipsec-lb -p opc-ipsec-lb-ebpf-common -p opc-session-net --all-targets --all-features -- -D warnings

      - name: Run conformance tests
        run: cargo test --locked -p opc-ipsec-lb -p opc-ipsec-lb-ebpf-common -p opc-session-net --all-features --quiet -- --test-threads=4

  docs:
    name: Rust docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2

      - name: Build crate docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --locked -p opc-ipsec-lb -p opc-ipsec-lb-ebpf-common -p opc-session-net --no-deps --all-features

  privileged-xdp:
    name: Privileged Linux XDP datapath
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2

      - name: Install kernel tooling
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y iproute2

      - name: Build privileged XDP test
        run: |
          set -euo pipefail
          export CARGO_HOME="${CARGO_HOME:-${HOME}/.cargo}"
          export RUSTUP_HOME="${RUSTUP_HOME:-${HOME}/.rustup}"
          export CARGO_TARGET_DIR="${RUNNER_TEMP}/ipsec-lb-target"
          cargo test --locked -p opc-ipsec-lb --test xdp_privileged --no-run

      # Proves the committed CO-RE artifact end-to-end on a real kernel:
      # keyless classification of UDP/500 IKE, UDP/4500 marker IKE vs
      # ESP-in-UDP, and native ESP; local pass for self-owned keys; explicit
      # userspace-redirector hand-off for remote-owned keys; fail-closed
      # slow-path counters for map miss, stale generation, and
      # unclassifiable candidates including real Hop-by-Hop and Shim6
      # extension-bearing packets; old-or-new owner/fence hash publication
      # under concurrent raw map access; graceful cross-process bpf-link
      # handoff under continuous traffic with no verdict gap; and
      # SIGKILL/restart behavior with owner flushing and persisted-fence
      # enforcement. It also fault-cuts the current global and
      # destination-scoped v5 cleanup order plus legacy-v1 map-unlink
      # boundaries, rejects active-map aliases without link mutation,
      # preserves unique maximum fence evidence, and migrates a frozen v3
      # link/map artifact to the current v5 destination-scoped fence ABI.
      - name: Run privileged XDP test in a fresh netns
        run: |
          set -euo pipefail
          export CARGO_HOME="${CARGO_HOME:-${HOME}/.cargo}"
          export RUSTUP_HOME="${RUSTUP_HOME:-${HOME}/.rustup}"
          export CARGO_TARGET_DIR="${RUNNER_TEMP}/ipsec-lb-target"
          sudo env \
            "PATH=${PATH}" \
            "CARGO_HOME=${CARGO_HOME}" \
            "RUSTUP_HOME=${RUSTUP_HOME}" \
            "CARGO_TARGET_DIR=${CARGO_TARGET_DIR}" \
            "OPC_IPSEC_LB_RUN_PRIVILEGED=1" \
            unshare -n -- bash -euxo pipefail -c '
              ip link set lo up
              cargo test --locked -p opc-ipsec-lb --test xdp_privileged -- --ignored --nocapture
            '

  ebpf-object:
    name: IPsec XDP object rebuild
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pinned nightly Rust toolchain
        run: |
          set -euo pipefail
          rustup toolchain install nightly-2026-06-22 --profile minimal --component rust-src

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/opc-ipsec-lb-ebpf

      - name: Install pinned bpf-linker
        run: cargo install bpf-linker --version 0.10.3 --locked

      # Rebuild the datapath object from source with the pinned toolchain and
      # fail on drift against the committed artifact. A whole-file byte-exact
      # comparison is not possible across build hosts: .debug_* sections and
      # the symbol tables embed path-derived crate disambiguators. The gate
      # therefore byte-compares every functional section (program, maps, BTF,
      # relocations) — byte-identical across checkout paths thanks to the
      # remap ordering in scripts/build-ipsec-lb-ebpf.sh — plus the symbol
      # inventory; the privileged job proves the artifact behaviorally.
      - name: Rebuild and compare program/map inventory
        run: |
          set -euo pipefail
          committed="${RUNNER_TEMP}/committed-opc-ipsec-lb-xdp.bpf.o"
          cp crates/opc-ipsec-lb/bpf/opc-ipsec-lb-xdp.bpf.o "${committed}"
          ./scripts/build-ipsec-lb-ebpf.sh
          rebuilt="crates/opc-ipsec-lb-ebpf/target/bpfel-unknown-none/release/opc-ipsec-lb-xdp"
          inventory() {
            readelf -sW "$1" | awk '
              ($4 == "FUNC" || $4 == "OBJECT") {
                if ($8 ~ /^_RNv/) next
                print $4, $8
              }
            ' | sort
          }
          inventory "${committed}" > committed.inventory
          inventory "${rebuilt}" > rebuilt.inventory
          cat rebuilt.inventory
          diff -u committed.inventory rebuilt.inventory
          for symbol in opc_ipsec_lb_xdp IPSEC_LB_OWNERS IPSEC_LB_CONFIG IPSEC_LB_FENCE IPSEC_LB_KEY_FENCES IPSEC_LB_COUNTERS; do
            grep -q " ${symbol}$" committed.inventory
          done
          for section in .text xdp maps .BTF .BTF.ext .relxdp .rel.BTF .rel.BTF.ext; do
            readelf -x "${section}" "${committed}" > committed.hex
            readelf -x "${section}" "${rebuilt}" > rebuilt.hex
            diff -u committed.hex rebuilt.hex
          done
