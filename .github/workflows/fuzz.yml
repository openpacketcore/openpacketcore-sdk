name: Fuzz

on:
  pull_request:
    paths:
      - ".github/workflows/fuzz.yml"
      - "crates/opc-proto-*/**"
      - "crates/opc-protocol/**"
  schedule:
    - cron: "17 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # The 2026-07-24 nightly ICEs while compiling Tokio with cargo-fuzz's
  # sanitizer/codegen flags. Advance this pin only after the full matrix passes.
  FUZZ_RUST_TOOLCHAIN: nightly-2026-07-23

jobs:
  fuzz:
    name: Scheduled fuzz
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crate:
          - opc-protocol
          - opc-proto-gtpu
          - opc-proto-pfcp
          - opc-proto-nas
          - opc-proto-ngap
          - opc-proto-eap
          - opc-proto-tft
          - opc-proto-gtpv2c
          - opc-proto-ikev2
          # Keep the Diameter CONFORMANCE.md scheduled-fuzz statement aligned.
          - opc-proto-diameter
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install nightly Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: ${{ env.FUZZ_RUST_TOOLCHAIN }}

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: List fuzz targets
        working-directory: crates/${{ matrix.crate }}
        run: cargo "+${FUZZ_RUST_TOOLCHAIN}" fuzz list

      - name: Run fuzz targets (600s each)
        working-directory: crates/${{ matrix.crate }}
        run: |
          for target in $(cargo "+${FUZZ_RUST_TOOLCHAIN}" fuzz list); do
            echo "=== Fuzzing $target ==="
            cargo "+${FUZZ_RUST_TOOLCHAIN}" fuzz run "$target" -- -max_total_time=600
          done

      - name: Upload fuzz artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-artifacts-${{ matrix.crate }}
          path: crates/${{ matrix.crate }}/fuzz/artifacts/**

  fuzz-smoke:
    name: PR fuzz smoke
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: fuzz-smoke-${{ github.ref }}-${{ matrix.crate }}
      cancel-in-progress: true
    strategy:
      matrix:
        crate:
          - opc-protocol
          - opc-proto-gtpu
          - opc-proto-pfcp
          - opc-proto-nas
          - opc-proto-ngap
          - opc-proto-eap
          - opc-proto-tft
          - opc-proto-gtpv2c
          - opc-proto-ikev2
          # Keep the Diameter CONFORMANCE.md scheduled-fuzz statement aligned.
          - opc-proto-diameter
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install nightly Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: ${{ env.FUZZ_RUST_TOOLCHAIN }}

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: List fuzz targets
        working-directory: crates/${{ matrix.crate }}
        run: cargo "+${FUZZ_RUST_TOOLCHAIN}" fuzz list

      - name: Run fuzz targets (60s each)
        working-directory: crates/${{ matrix.crate }}
        run: |
          for target in $(cargo "+${FUZZ_RUST_TOOLCHAIN}" fuzz list); do
            echo "=== Fuzzing $target ==="
            cargo "+${FUZZ_RUST_TOOLCHAIN}" fuzz run "$target" -- -max_total_time=60
          done

      - name: Upload fuzz artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-smoke-artifacts-${{ matrix.crate }}
          path: crates/${{ matrix.crate }}/fuzz/artifacts/**
