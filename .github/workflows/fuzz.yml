name: Fuzz

on:
  schedule:
    - cron: "17 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fuzz:
    name: Fuzz smoke test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crate:
          - opc-protocol
          - opc-proto-gtpu
          - opc-proto-pfcp
          - opc-proto-nas
          - opc-proto-ngap
          - opc-proto-gtpv2c
          # Keep the Diameter CONFORMANCE.md scheduled-fuzz statement aligned.
          - opc-proto-diameter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nightly Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: List fuzz targets
        working-directory: crates/${{ matrix.crate }}
        run: cargo +nightly fuzz list

      - name: Run fuzz targets (120s each)
        working-directory: crates/${{ matrix.crate }}
        run: |
          for target in $(cargo +nightly fuzz list); do
            echo "=== Fuzzing $target ==="
            cargo +nightly fuzz run "$target" -- -max_total_time=120
          done

      - name: Upload fuzz artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-artifacts-${{ matrix.crate }}
          path: crates/${{ matrix.crate }}/fuzz/artifacts/
