[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
    # Marvin Attack timing sidechannel in the `rsa` crate's private-key
    # operations. No fixed release exists upstream. Default builds of
    # opc-proto-ikev2 use the crate for RSA signature *verification* only
    # (public-key operations, outside the advisory's scope); RSA private-key
    # signing is compiled only behind the opt-in `rsa-signing` feature and
    # ECDSA responder certificates are the recommended deployment. This scan
    # runs --all-features, so the dependency is flagged regardless. Remove
    # once `rsa` ships the constant-time rewrite (tracked for the 0.10 line).
    { id = "RUSTSEC-2023-0071", reason = "rsa Marvin: no fixed version; verify-only by default, signing opt-in via rsa-signing feature" },
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

# Scoped exceptions for permissive-but-uncommon licenses on specific crates,
# kept out of the global allow list so new uses still trip the gate.
exceptions = [
    # Mozilla CA bundle data shipped with rustls.
    { allow = ["CDLA-Permissive-2.0"], crate = "webpki-roots" },
    # UEFI-only transitive dependency of getrandom; never built for our targets.
    # cargo-deny 0.17 expects the bare GNU license identifier in exceptions.
    { allow = ["LGPL-2.1"], crate = "r-efi" },
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
