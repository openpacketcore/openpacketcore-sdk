apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sdk-reference-operator.fullname" . }}
  labels:
    {{- include "sdk-reference-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sdk-reference-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sdk-reference-operator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "sdk-reference-operator.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
      containers:
      - name: manager
        command:
        - /manager
        args:
        - --health-probe-bind-address=:8081
        - --metrics-bind-address=:8080
        {{- if .Values.leaderElection.enabled }}
        - --leader-elect
        {{- end }}
        env:
        - name: OPERATOR_LIFECYCLE_CLI_PATH
          value: {{ .Values.cliBridge.path | quote }}
        - name: ENABLE_WORKLOAD_SYNTHESIS
          value: {{ .Values.workloadSynthesis.enabled | quote }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: cert
          readOnly: true
      terminationGracePeriodSeconds: 10
      volumes:
      - name: cert
        secret:
          defaultMode: 420
          secretName: {{ default (printf "%s-webhook-server-cert" (include "sdk-reference-operator.fullname" .)) .Values.webhook.secretName }}
