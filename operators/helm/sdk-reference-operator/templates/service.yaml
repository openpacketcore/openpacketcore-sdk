apiVersion: v1
kind: Service
metadata:
  name: {{ include "sdk-reference-operator.fullname" . }}-webhook-service
  labels:
    {{- include "sdk-reference-operator.labels" . | nindent 4 }}
spec:
  ports:
  - port: 443
    protocol: TCP
    targetPort: 9443
  selector:
    {{- include "sdk-reference-operator.selectorLabels" . | nindent 4 }}
---
{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sdk-reference-operator.fullname" . }}-metrics-service
  labels:
    {{- include "sdk-reference-operator.labels" . | nindent 4 }}
spec:
  ports:
  - name: metrics
    port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    {{- include "sdk-reference-operator.selectorLabels" . | nindent 4 }}
{{- end }}
