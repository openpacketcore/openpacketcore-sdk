# cargo-audit configuration for the `Rust advisory scan` CI job.

[advisories]
# Marvin Attack timing sidechannel in the `rsa` crate's private-key
# operations (no fixed release upstream). Accepted for the IKEv2 signature
# AUTH path in opc-proto-ikev2, which performs RSASSA-PKCS1-v1_5 signing
# only and never the PKCS#1 v1.5 decryption the advisory centers on.
# Mirror of the ignore entry in deny.toml — keep the two in sync and drop
# both once `rsa` ships the constant-time rewrite.
ignore = ["RUSTSEC-2023-0071"]
