[package]
name = "opc-proto-ikev2-fuzz"
version = "0.0.0"
edition = "2021"
publish = false

[package.metadata]
cargo-fuzz = true

[dependencies]
bytes = "1.8"
libfuzzer-sys = "0.4"
opc-protocol = { path = "../../opc-protocol" }
opc-proto-ikev2 = { path = ".." }

[workspace]

[[bin]]
name = "decode_message"
path = "fuzz_targets/decode_message.rs"
test = false

[[bin]]
name = "roundtrip"
path = "fuzz_targets/roundtrip.rs"
test = false
