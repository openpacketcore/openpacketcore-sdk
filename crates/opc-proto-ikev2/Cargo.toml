[package]
name = "opc-proto-ikev2"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Experimental IKEv2 header and payload-chain codec scaffold for OpenPacketCore"
readme = "README.md"
documentation = "https://docs.rs/opc-proto-ikev2"
keywords = ["ikev2", "ipsec", "telecom", "packet-core", "codec"]
categories = ["network-programming", "encoding"]
publish = false

[features]
# Enables RSA private-key signing for IKE_AUTH methods 1 and 14. Off by
# default so standard builds perform no RSA private-key operations and stay
# outside the practical scope of RUSTSEC-2023-0071 (Marvin timing
# sidechannel); RSA *verification* of peers is always available. Prefer
# ECDSA (P-256/P-384) responder certificates.
rsa-signing = []
testkit = []

[dependencies]
aes-gcm = { workspace = true }
bytes = { workspace = true }
crypto-bigint = { version = "0.7.5", features = ["getrandom", "zeroize"] }
hmac = { workspace = true }
opc-protocol = { path = "../opc-protocol", version = "0.2.0" }
opc-proto-tft = { path = "../opc-proto-tft", version = "0.2.0" }
opc-types = { path = "../opc-types", version = "0.2.0" }
p256 = { version = "0.14.0-rc.10", default-features = false, features = ["ecdh", "ecdsa", "pkcs8", "std"] }
p384 = { version = "0.14.0-rc.10", default-features = false, features = ["ecdh", "ecdsa", "pkcs8", "std"] }
p521 = { version = "0.14.0-rc.10", default-features = false, features = ["ecdh", "std"] }
rsa = { workspace = true }
sha1 = { workspace = true }
sha2 = { workspace = true }
subtle = { workspace = true }
x509-parser = { workspace = true }
zeroize = { workspace = true }

[dev-dependencies]
opc-proto-ikev2 = { path = ".", version = "0.2.0", features = ["testkit"] }
opc-proto-gtpv2c = { path = "../opc-proto-gtpv2c", version = "0.2.0" }
quickcheck = "1"

[lints]
workspace = true
