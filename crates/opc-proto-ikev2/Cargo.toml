[package]
name = "opc-proto-ikev2"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Experimental IKEv2 header and payload-chain codec scaffold for OpenPacketCore"
readme = "README.md"
documentation = "https://docs.rs/opc-proto-ikev2"
keywords = ["ikev2", "ipsec", "telecom", "packet-core", "codec"]
categories = ["network-programming", "encoding"]
publish = false

[features]
testkit = []

[dependencies]
aes-gcm = { workspace = true }
bytes = { workspace = true }
crypto-bigint = { version = "0.7.5", features = ["getrandom", "zeroize"] }
hmac = { workspace = true }
opc-protocol = { path = "../opc-protocol", version = "0.2.0" }
p256 = { version = "0.14.0-rc.10", default-features = false, features = ["ecdh", "std"] }
p384 = { version = "0.14.0-rc.10", default-features = false, features = ["ecdh", "std"] }
p521 = { version = "0.14.0-rc.10", default-features = false, features = ["ecdh", "std"] }
sha1 = { workspace = true }
sha2 = { workspace = true }
zeroize = { workspace = true }

[dev-dependencies]
opc-proto-ikev2 = { path = ".", version = "0.2.0", features = ["testkit"] }

[lints]
workspace = true
