[package]
name = "opc-proto-diameter"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Experimental Diameter base codec and dictionary scaffold for OpenPacketCore"
readme = "README.md"
documentation = "https://docs.rs/opc-proto-diameter"
keywords = ["diameter", "aaa", "telecom", "packet-core", "codec"]
categories = ["network-programming", "encoding"]
publish = false # experimental scaffold: not published until conformance matures

[features]
default = ["base"]
base = []
peer = ["base"]
app-gx = ["base"]
app-rf = ["base"]
app-s6a = ["base"]
app-s6b = ["base"]
app-swm = ["base"]
app-swx = ["base"]
all-apps = ["app-gx", "app-rf", "app-s6a", "app-s6b", "app-swm", "app-swx"]

[dependencies]
bytes = { workspace = true }
hmac = { workspace = true }
opc-protocol = { path = "../opc-protocol", version = "0.2.0" }
opc-types = { path = "../opc-types", version = "0.2.0" }
sha2 = { workspace = true }
subtle = { workspace = true }
zeroize = { workspace = true }

[dev-dependencies]
opc-testbed = { path = "../opc-testbed", version = "0.2.0" }
quickcheck = "1"

[[test]]
name = "app_dictionaries"
path = "tests/app_dictionaries.rs"
required-features = ["app-rf", "app-swm"]

[[test]]
name = "testbed_bridge"
path = "tests/testbed_bridge.rs"
required-features = ["peer"]

[[test]]
name = "error_answers"
path = "tests/error_answers.rs"
required-features = ["app-swm", "peer"]

[[test]]
name = "swm_lifecycle"
path = "tests/swm_lifecycle.rs"
required-features = ["app-swm"]

[[test]]
name = "swm_authorization"
path = "tests/swm_authorization.rs"
required-features = ["app-swm"]

[[test]]
name = "swm_public_lifecycle"
path = "tests/swm_public_lifecycle.rs"
required-features = ["app-swm"]

[[test]]
name = "swm_diameter_eap_overload"
path = "tests/swm_diameter_eap_overload.rs"
required-features = ["app-swm"]

[lints]
workspace = true
