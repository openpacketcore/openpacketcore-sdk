[package]
name = "opc-runtime"
version.workspace = true
publish = false # issue #143 source-build release closure
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "OpenPacketCore CNF runtime chassis — startup phases, task supervision, health, and shutdown"
readme = "README.md"


documentation = "https://docs.rs/opc-runtime"
keywords = ["5g", "cnf", "runtime", "telecom", "packet-core"]
categories = ["network-programming"]
[features]
default = []
observability = ["dep:opc-observability"]

[lints]
workspace = true

[dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "net", "macros", "sync", "time", "signal", "io-util"] }
tracing = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
time = { workspace = true }
uuid = { workspace = true }
thiserror = { workspace = true }
num_cpus = { workspace = true }
futures-util = "0.3"
nix = { workspace = true, features = ["net", "uio"] }
opc-alarm = { path = "../opc-alarm", version = "0.2.0" }
opc-observability = { path = "../opc-observability", version = "0.2.0", optional = true }
opc-redaction = { path = "../opc-redaction", version = "0.2.0" }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "time", "sync"] }
opc-sbi = { path = "../opc-sbi", version = "0.2.0", features = ["testkit", "runtime-hooks"] }
opc-types = { path = "../opc-types", version = "0.2.0" }
