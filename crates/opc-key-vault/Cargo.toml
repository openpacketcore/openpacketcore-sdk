[package]
name = "opc-key-vault"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "HashiCorp Vault Transit KMS adapter for opc-key"
readme = "README.md"
documentation = "https://docs.rs/opc-key-vault"
keywords = ["5g", "cnf", "vault", "kms", "crypto"]
categories = ["cryptography"]
publish = true

[features]
default = []
k8s-auth = []

[dependencies]
opc-key = { path = "../opc-key", version = "0.1.0" }
opc-types = { path = "../opc-types", version = "0.1.0" }
async-trait = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["sync", "net", "time"] }
tracing = { workspace = true }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
thiserror = { workspace = true }
url = "2.5"
base64 = "0.22"

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
serde_json = { workspace = true }
opc-crypto = { path = "../opc-crypto", version = "0.1.0" }

[lints]
workspace = true
