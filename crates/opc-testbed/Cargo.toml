[package]
name = "opc-testbed"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Scenario DSL, virtual time, assertions, fixture provenance, and simulator framework for OpenPacketCore (RFC 012)"


readme = "README.md"
documentation = "https://docs.rs/opc-testbed"
keywords = ["5g", "cnf", "testing", "telecom", "packet-core"]
categories = ["development-tools::testing", "network-programming"]
[dependencies]
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
# serde_yaml 0.9 is marked deprecated on crates.io.  We retain it for now
# because the maintained forks (yaml_serde, serde_yaml_ng) either require
# a newer rustc than our workspace floor (currently 1.88) or have not been validated
# for our exact use case.  A tracked migration should happen once a fork
# is confirmed stable and compatible.
serde_yaml = "0.9"
serde_json = { workspace = true }
time = { workspace = true, features = ["formatting", "parsing", "serde"] }
opc-types = { path = "../opc-types", version = "0.2.0" }
opc-evidence = { path = "../opc-evidence", version = "0.2.0" }
opc-protocol = { path = "../opc-protocol", version = "0.2.0" }
opc-schema-validate = { path = "../opc-schema-validate", version = "0.2.0" }
opc-redaction = { path = "../opc-redaction", version = "0.2.0" }
opc-node-resources = { path = "../opc-node-resources", version = "0.2.0" }

[dev-dependencies]
opc-crypto-provider = { path = "../opc-crypto-provider", version = "0.2.0" }
opc-ipsec-xfrm = { path = "../opc-ipsec-xfrm", version = "0.2.0", features = ["ikev2"] }
opc-proto-diameter = { path = "../opc-proto-diameter", version = "0.2.0", features = ["app-swm"] }
opc-proto-ikev2 = { path = "../opc-proto-ikev2", version = "0.2.0" }
opc-proto-gtpu = { path = "../opc-proto-gtpu", version = "0.2.0" }
opc-proto-gtpv2c = { path = "../opc-proto-gtpv2c", version = "0.2.0" }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

[lints]
workspace = true
