[package]
name = "opc-testbed"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Scenario DSL, virtual time, assertions, fixture provenance, and simulator framework for OpenPacketCore (RFC 012)"

[dependencies]
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
# serde_yaml 0.9 is marked deprecated on crates.io.  We retain it for now
# because the maintained forks (yaml_serde, serde_yaml_ng) either require
# a newer rustc than our workspace floor (1.78) or have not been validated
# for our exact use case.  A tracked migration should happen once a fork
# is confirmed stable and compatible.
serde_yaml = "0.9"
serde_json = { workspace = true }
time = { workspace = true, features = ["formatting", "parsing", "serde"] }
opc-types = { path = "../opc-types" }
opc-evidence = { path = "../opc-evidence" }
opc-schema-validate = { path = "../opc-schema-validate" }
opc-redaction = { path = "../opc-redaction" }
opc-node-resources = { path = "../opc-node-resources" }

[lints]
workspace = true
