[package]
name = "operator-lifecycle-cli"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
publish = false
description = "CLI interface exposing Rust SDK lifecycle contracts to Go controller-runtime operators via JSON"

[dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
time = { workspace = true, features = ["serde"] }
opc-alarm = { path = "../opc-alarm", version = "0.2.0" }
opc-types = { path = "../opc-types", version = "0.2.0" }
opc-node-resources = { path = "../opc-node-resources", version = "0.2.0" }
opc-runtime = { path = "../opc-runtime", version = "0.2.0" }
operator-lifecycle = { path = "../operator-lifecycle", version = "0.2.0" }
operator-controller = { path = "../operator-controller", version = "0.2.0" }

[lints]
workspace = true
