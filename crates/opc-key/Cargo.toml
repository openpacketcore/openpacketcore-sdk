[package]
name = "opc-key"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Key-provider traits, in-memory adapters, and tenant-bound AEAD payload helpers for OpenPacketCore"


readme = "README.md"
documentation = "https://docs.rs/opc-key"
keywords = ["5g", "cnf", "cryptography", "telecom", "packet-core"]
categories = ["cryptography", "network-programming"]
[dependencies]
aes-gcm-siv = { workspace = true }
async-trait = { workspace = true }
hkdf = { workspace = true }
opc-types = { path = "../opc-types", version = "0.2.0" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
subtle = { workspace = true }
thiserror = { workspace = true }
zeroize = { workspace = true }
tokio = { workspace = true, features = ["sync", "net", "time"] }
tokio-rustls = { workspace = true }
rustls-pki-types = { workspace = true }
opc-tls = { path = "../opc-tls", version = "0.2.0" }
opc-identity = { path = "../opc-identity", version = "0.2.0" }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

[lints]
workspace = true