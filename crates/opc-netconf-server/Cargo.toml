[package]
name = "opc-netconf-server"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Capability-honest NETCONF server core for the OpenPacketCore management plane"
readme = "README.md"
documentation = "https://docs.rs/opc-netconf-server"
keywords = ["5g", "cnf", "netconf", "yang", "management"]
categories = ["network-programming", "parser-implementations"]

[features]
testkit = ["dep:rand"]

[dependencies]
opc-config-bus = { path = "../opc-config-bus", version = "0.2.0" }
opc-config-model = { path = "../opc-config-model", version = "0.2.0" }
opc-mgmt-audit = { path = "../opc-mgmt-audit", version = "0.2.0" }
opc-mgmt-authz = { path = "../opc-mgmt-authz", version = "0.2.0" }
opc-mgmt-errors = { path = "../opc-mgmt-errors", version = "0.2.0" }
opc-mgmt-limits = { path = "../opc-mgmt-limits", version = "0.2.0" }
opc-mgmt-opstate = { path = "../opc-mgmt-opstate", version = "0.2.0" }
opc-mgmt-principal = { path = "../opc-mgmt-principal", version = "0.2.0" }
opc-mgmt-schema = { path = "../opc-mgmt-schema", version = "0.2.0" }
opc-mgmt-transport = { path = "../opc-mgmt-transport", version = "0.2.0" }
opc-redaction = { path = "../opc-redaction", version = "0.2.0" }
opc-types = { path = "../opc-types", version = "0.2.0" }
opc-identity = { path = "../opc-identity", version = "0.2.0" }
opc-runtime = { path = "../opc-runtime", version = "0.2.0" }
quick-xml = { version = "0.41", default-features = false }
rand = { workspace = true, optional = true }
russh = { version = "0.61.2", default-features = false, features = ["ring"] }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["io-util", "net", "rt", "sync", "time"] }
tokio-rustls = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
async-trait = { workspace = true }
opc-nacm = { path = "../opc-nacm", version = "0.2.0" }
opc-tls = { path = "../opc-tls", version = "0.2.0" }
rand = { workspace = true }
rcgen = { workspace = true }
tempfile = "3"
time = { workspace = true }
tokio = { workspace = true, features = ["io-util", "macros", "net", "rt", "sync", "time"] }

[lints]
workspace = true
