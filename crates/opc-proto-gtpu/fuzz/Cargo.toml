[package]
name = "opc-proto-gtpu-fuzz"
version = "0.0.0"
edition = "2021"
publish = false

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
opc-protocol = { path = "../../opc-protocol" }
opc-proto-gtpu = { path = ".." }
bytes = "1.8"

[workspace]

[[bin]]
name = "decode"
path = "fuzz_targets/decode.rs"
test = false

[[bin]]
name = "roundtrip"
path = "fuzz_targets/roundtrip.rs"
test = false
