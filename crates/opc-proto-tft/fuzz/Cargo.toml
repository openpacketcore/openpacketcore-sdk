[package]
name = "opc-proto-tft-fuzz"
version = "0.0.0"
edition = "2021"
publish = false

[package.metadata]
cargo-fuzz = true

[dependencies]
bytes = "1.8"
libfuzzer-sys = "0.4"
opc-proto-tft = { path = ".." }
opc-protocol = { path = "../../opc-protocol" }

[workspace]

[[bin]]
name = "decode_tft"
path = "fuzz_targets/decode_tft.rs"
test = false

[[bin]]
name = "roundtrip_tft"
path = "fuzz_targets/roundtrip_tft.rs"
test = false
