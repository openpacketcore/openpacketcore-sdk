[package]
name = "opc-ipsec-xfrm"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Safe Linux XFRM IPsec backend model, mock backend, and redaction-safe errors for OpenPacketCore"
readme = "README.md"
documentation = "https://docs.rs/opc-ipsec-xfrm"
keywords = ["5g", "ipsec", "xfrm", "linux", "packet-core"]
