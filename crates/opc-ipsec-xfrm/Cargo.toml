[package]
name = "opc-ipsec-xfrm"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Safe Linux XFRM IPsec backend model, mock backend, and redaction-safe errors for OpenPacketCore"
readme = "README.md"
documentation = "https://docs.rs/opc-ipsec-xfrm"
keywords = ["5g", "ipsec", "xfrm", "linux", "packet-core"]
categories = ["network-programming", "os::linux-apis"]
publish = false

[features]
default = []
ikev2 = ["dep:opc-proto-ikev2"]

[dependencies]
opc-linux-xfrm-sys = { path = "../opc-linux-xfrm-sys", version = "0.2.0" }
opc-ipsec-xfrm-ebpf-common = { path = "../opc-ipsec-xfrm-ebpf-common", version = "0.2.0" }
opc-types = { path = "../opc-types", version = "0.2.0" }
opc-proto-ikev2 = { path = "../opc-proto-ikev2", version = "0.2.0", optional = true }
async-trait = { workspace = true }
subtle = { workspace = true }
thiserror = { workspace = true }
zeroize = { workspace = true }
tokio = { workspace = true, features = ["rt", "sync", "time"] }

[target.'cfg(target_os = "linux")'.dependencies]
aya = { version = "0.14" }
opc-linux-gtpu-sys = { path = "../opc-linux-gtpu-sys", version = "0.2.0" }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "sync"] }

[target.'cfg(target_os = "linux")'.dev-dependencies]
nix = { workspace = true, features = ["net", "sched", "socket"] }

[lints]
workspace = true
