[package]
name = "opc-persist"
version.workspace = true
publish = false # source-build only until the issue #143 Openraft migration gate is satisfied
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "ConfigStore trait and SQLite backend for OpenPacketCore persistence and audit"


readme = "README.md"
documentation = "https://docs.rs/opc-persist"
keywords = ["5g", "cnf", "storage", "telecom", "packet-core"]
categories = ["network-programming", "data-structures"]
[dependencies]
thiserror = { workspace = true }
serde = { workspace = true }
async-trait = { workspace = true }
tokio = { workspace = true, features = ["sync", "time", "io-util", "fs", "rt"] }
tracing = { workspace = true }
uuid = { workspace = true }
time = { workspace = true }
sha2 = { workspace = true }
hmac = { workspace = true }
serde_json = { workspace = true }
zeroize = { workspace = true }

# SQLite with bundled static library (no system SQLite needed)
# rusqlite 0.40 pulls libsqlite3-sys 0.38, whose build script needs cfg_select!
# (Rust 1.91); held at 0.32 while the workspace MSRV is 1.88.
rusqlite = { version = "0.32", features = ["backup", "bundled", "hooks"] }
rand = { workspace = true }
libc = "0.2"

# Shared types across the SDK
opc-types = { path = "../opc-types", version = "0.2.0" }
opc-redaction = { path = "../opc-redaction", version = "0.2.0" }
opc-data-governance = { path = "../opc-data-governance", version = "0.2.0" }
opc-nacm = { path = "../opc-nacm", version = "0.2.0" }
opc-key = { path = "../opc-key", version = "0.2.0" }
opc-crypto = { path = "../opc-crypto", version = "0.2.0" }
opc-consensus = { path = "../opc-consensus", version = "0.2.0" }

[features]
default = []
dangerous-test-hooks = []

[lints]
workspace = true

[dev-dependencies]
tempfile = "3"
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "process"] }
opc-alarm = { path = "../opc-alarm", version = "0.2.0" }
