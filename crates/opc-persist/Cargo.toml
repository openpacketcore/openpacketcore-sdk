[package]
name = "opc-persist"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "ConfigStore trait and SQLite backend for OpenPacketCore persistence and audit"


readme = "README.md"
documentation = "https://docs.rs/opc-persist"
keywords = ["5g", "cnf", "storage", "telecom", "packet-core"]
categories = ["network-programming", "data-structures"]
[dependencies]
thiserror = { workspace = true }
serde = { workspace = true }
async-trait = { workspace = true }
tokio = { workspace = true, features = ["sync", "time", "net", "io-util", "rt"] }
tracing = { workspace = true }
uuid = { workspace = true }
time = { workspace = true }
sha2 = { workspace = true }
hmac = { workspace = true }
serde_json = { workspace = true }
zeroize = { workspace = true }
rustls = { workspace = true }
tokio-rustls = { workspace = true }
rustls-pki-types = { workspace = true }
x509-parser = { workspace = true }

# SQLite with bundled static library (no system SQLite needed)
rusqlite = { version = "0.32", features = ["bundled"] }
rand = { workspace = true }

# Shared types across the SDK
opc-types = { path = "../opc-types", version = "0.1.0" }
opc-redaction = { path = "../opc-redaction", version = "0.1.0" }
opc-data-governance = { path = "../opc-data-governance", version = "0.1.0" }
opc-identity = { path = "../opc-identity", version = "0.1.0" }
opc-tls = { path = "../opc-tls", version = "0.1.0" }
opc-nacm = { path = "../opc-nacm", version = "0.1.0" }
opc-key = { path = "../opc-key", version = "0.1.0" }
opc-crypto = { path = "../opc-crypto", version = "0.1.0" }

[features]
default = []
dangerous-test-hooks = []

[lints]
workspace = true

[dev-dependencies]
tempfile = "3"
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "process"] }
rcgen = { workspace = true }
opc-alarm = { path = "../opc-alarm", version = "0.1.0" }