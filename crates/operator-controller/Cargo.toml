[package]
name = "operator-controller"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
publish = false
description = "Kubernetes operator controller execution layer, including CRD conversion, state migration, out-of-process drain execution, and multi-cluster status orchestration"

[dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
time = { workspace = true, features = ["serde"] }
uuid = { workspace = true }
async-trait = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "net", "macros", "time"] }
opc-types = { path = "../opc-types", version = "0.2.0" }
opc-config-model = { path = "../opc-config-model", version = "0.2.0" }
opc-node-resources = { path = "../opc-node-resources", version = "0.2.0" }
opc-alarm = { path = "../opc-alarm", version = "0.2.0" }
opc-runtime = { path = "../opc-runtime", version = "0.2.0" }
opc-config-bus = { path = "../opc-config-bus", version = "0.2.0" }
operator-lifecycle = { path = "../operator-lifecycle", version = "0.2.0" }
semver = "1.0"

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "time"] }

[lints]
workspace = true
