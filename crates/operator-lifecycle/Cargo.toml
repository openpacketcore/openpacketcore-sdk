[package]
name = "operator-lifecycle"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Kubernetes production-readiness lifecycle foundation, config-apply, admission, and drain/upgrade planning"


readme = "README.md"
documentation = "https://docs.rs/operator-lifecycle"
keywords = ["5g", "cnf", "kubernetes", "telecom", "packet-core"]
categories = ["network-programming"]
[dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
time = { workspace = true, features = ["serde", "serde-well-known"] }
uuid = { workspace = true }
semver = "1.0"
opc-types = { path = "../opc-types", version = "0.2.0" }
opc-config-model = { path = "../opc-config-model", version = "0.2.0" }
opc-node-resources = { path = "../opc-node-resources", version = "0.2.0" }
opc-alarm = { path = "../opc-alarm", version = "0.2.0" }
opc-runtime = { path = "../opc-runtime", version = "0.2.0" }
opc-config-bus = { path = "../opc-config-bus", version = "0.2.0" }
opc-redaction = { path = "../opc-redaction", version = "0.2.0" }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }

[lints]
workspace = true
