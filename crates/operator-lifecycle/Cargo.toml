[package]
name = "operator-lifecycle"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Kubernetes production-readiness lifecycle foundation, config-apply, admission, and drain/upgrade planning"

[dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
time = { workspace = true, features = ["serde"] }
uuid = { workspace = true }
semver = "1.0"
opc-types = { path = "../opc-types" }
opc-config-model = { path = "../opc-config-model" }
opc-node-resources = { path = "../opc-node-resources" }
opc-alarm = { path = "../opc-alarm" }
opc-runtime = { path = "../opc-runtime" }
opc-config-bus = { path = "../opc-config-bus" }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
