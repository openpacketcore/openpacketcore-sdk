[package]
name = "opc-session-store"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "High-performance session store substrate for OpenPacketCore: state classes, keys, CAS, leases, fencing, and testkit backends (RFC 004)"


readme = "README.md"
documentation = "https://docs.rs/opc-session-store"
keywords = ["5g", "cnf", "session", "telecom", "packet-core"]
categories = ["network-programming", "data-structures"]
[dependencies]
opc-crypto = { path = "../opc-crypto", version = "0.2.0" }
opc-key = { path = "../opc-key", version = "0.2.0" }
opc-types = { path = "../opc-types", version = "0.2.0" }
opc-redaction = { path = "../opc-redaction", version = "0.2.0" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["time", "sync"] }
tracing = { workspace = true }
bytes = { workspace = true }
uuid = { workspace = true }
time = { workspace = true, features = ["serde"] }
async-trait = { workspace = true }
sha2 = { workspace = true }
hmac = { workspace = true }
futures-util = "0.3"
# rusqlite 0.40 pulls libsqlite3-sys 0.38, whose build script needs cfg_select!
# (Rust 1.91); held at 0.32 while the workspace MSRV is 1.88.
rusqlite = { version = "0.40", features = ["bundled"] }

[dev-dependencies]
serde_json = { workspace = true }
tokio = { workspace = true, features = ["time", "sync", "test-util"] }
tempfile = "3"

[lints]
workspace = true