[package]
name = "opc-session-store"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "High-performance session store substrate for OpenPacketCore: state classes, keys, CAS, leases, fencing, and testkit backends (RFC 004)"

[dependencies]
opc-crypto = { path = "../opc-crypto" }
opc-key = { path = "../opc-key" }
opc-types = { path = "../opc-types" }
opc-redaction = { path = "../opc-redaction" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["time", "sync"] }
tracing = { workspace = true }
bytes = { workspace = true }
uuid = { workspace = true }
time = { workspace = true, features = ["serde"] }
async-trait = { workspace = true }
sha2 = { workspace = true }
hmac = { workspace = true }
futures-util = "0.3"
rusqlite = { version = "0.32", features = ["bundled"] }

[dev-dependencies]
serde_json = { workspace = true }
tokio = { workspace = true, features = ["time", "sync", "test-util"] }
tempfile = "3"

[lints]
workspace = true
