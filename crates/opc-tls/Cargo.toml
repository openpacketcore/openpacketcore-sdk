[package]
name = "opc-tls"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Reloadable SPIFFE-aware mTLS client and server support for OpenPacketCore"


readme = "README.md"
documentation = "https://docs.rs/opc-tls"
keywords = ["5g", "cnf", "tls", "telecom", "packet-core"]
categories = ["network-programming", "cryptography"]
[dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json = "1.0"
thiserror = { workspace = true }
tokio = { workspace = true, features = ["sync", "net", "time"] }
tracing = { workspace = true }
time = { workspace = true }
x509-parser = { workspace = true }
rustls-pki-types = { workspace = true }
rustls = { workspace = true }
tokio-rustls = { workspace = true }
opc-types = { path = "../opc-types", version = "0.2.0" }
opc-identity = { path = "../opc-identity", version = "0.2.0" }
opc-redaction = { path = "../opc-redaction", version = "0.2.0" }

[dev-dependencies]
rcgen = { workspace = true }

[lints]
workspace = true
