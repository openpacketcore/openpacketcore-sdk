[package]
name = "opc-sdk-integration"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
publish = false
description = "Toy OpenPacketCore NF integration crate wiring runtime, config bus, alarms, and testbed evidence"

[dependencies]
opc-alarm = { path = "../opc-alarm", version = "0.2.0" }
opc-config-bus = { path = "../opc-config-bus", version = "0.2.0" }
opc-config-model = { path = "../opc-config-model", version = "0.2.0" }
opc-runtime = { path = "../opc-runtime", version = "0.2.0" }
opc-testbed = { path = "../opc-testbed", version = "0.2.0" }
opc-types = { path = "../opc-types", version = "0.2.0" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
time = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt", "sync", "time"] }

[dev-dependencies]
opc-alarm-testkit = { path = "../opc-alarm-testkit", version = "0.2.0" }
async-trait = { workspace = true }
bytes = { workspace = true }
opc-crypto = { path = "../opc-crypto", version = "0.2.0" }
opc-evidence = { path = "../opc-evidence", version = "0.2.0" }
opc-key = { path = "../opc-key", version = "0.2.0" }
opc-nacm = { path = "../opc-nacm", version = "0.2.0" }
opc-session-store = { path = "../opc-session-store", version = "0.2.0" }
opc-persist = { path = "../opc-persist", version = "0.2.0", features = ["dangerous-test-hooks"] }
opc-redaction = { path = "../opc-redaction", version = "0.2.0" }
opc-data-governance = { path = "../opc-data-governance", version = "0.2.0" }
opc-privacy = { path = "../opc-privacy", version = "0.2.0" }
opc-export = { path = "../opc-export", version = "0.2.0" }
rusqlite = { version = "0.32", features = ["bundled"] }
tempfile = "3"

[lints]
workspace = true
