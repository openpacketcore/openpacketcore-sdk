# Reference BIRD 2 configuration for the gated opc-ipsec-lb routing-adapter
# integration test (tests/routing_bird_integration.rs).
#
# Documentation prefixes (RFC 5737) and RFC 6996 private ASNs only.
# The adapter-managed fragment directory is /etc/bird/opc.d.

router id 192.0.2.2;

include "/etc/bird/opc.d/*.conf";

protocol device {
    scan time 10;
}

protocol bfd bfd1 {
    interface "lo" {
        min rx interval 50 ms;
        min tx interval 50 ms;
        idle tx interval 300 ms;
    };
}

protocol bgp edge_a {
    local 192.0.2.2 as 64512;
    neighbor 192.0.2.1 as 64513;
    ipv4 {
        import none;
        export where proto = "opc_adv_64512";
    };
    bfd on;
}
